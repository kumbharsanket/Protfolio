<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Call of Duty - Fan Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Oswald', sans-serif;
            color: white;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                        url('https://images.unsplash.com/photo-1605902711622-cfb43c4437d5') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 2px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #f39c12;
        }

        .hero {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-content h2 {
            font-size: 60px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .hero-content p {
            margin: 20px 0;
            font-size: 18px;
            max-width: 600px;
        }

        .btn {
            padding: 15px 35px;
            background: #f39c12;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ffffff;
        }

        footer {
            background: rgba(0,0,0,0.9);
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .hero-content h2 {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>CALL OF DUTY</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Multiplayer</a>
            <a href="#">Warzone</a>
            <a href="#">Zombies</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Enter the Battlefield</h2>
            <p>
                Experience intense combat, realistic graphics, and fast-paced action.
                Join millions of players worldwide and dominate the warzone.
            </p>
            <a href="#" class="btn">Play Now</a>
        </div>
    </section>

    <footer>
        © 2026 Call of Duty Fan Website | Not affiliated with Activision
    </footer>

</body>
</html>
